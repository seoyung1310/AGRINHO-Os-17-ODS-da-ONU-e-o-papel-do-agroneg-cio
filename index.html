<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Painel ODS e Agronegócio</title>
</head>
<body>
    <h1>Jornada das ODS</h1>
    
    <div class="secao-botoes" id="botoes-ods"></div>

    <div id="display-info" class="card-decorado hidden">
        <h2 id="titulo-ods"></h2>
        <p id="descricao-ods"></p>
    </div>

    <div class="grid-container">
        <!-- 6 Espaços para texto -->
        <div class="card-decorado">Texto Informativo 1</div>
        <div class="card-decorado">Texto Informativo 2</div>
        <div class="card-decorado">Texto Informativo 3</div>
        <div class="card-decorado">Texto Informativo 4</div>
        <div class="card-decorado">Texto Informativo 5</div>
        <div class="card-decorado">Texto Informativo 6</div>
    </div>

    <div class="galeria-imagens">
        <!-- 3 Espaços para imagens -->
        <div class="img-box">Imagem 1</div>
        <div class="img-box">Imagem 2</div>
        <div class="img-box">Imagem 3</div>
    </div>

    <script src="main.js"></script>
</body>
</html>
